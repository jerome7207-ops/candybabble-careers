<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Checkout cancelled — CandyBabble Careers</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E🍭%3C/text%3E%3C/svg%3E">
<style>
  :root { color-scheme: dark; --bg:#0a0a0f; --fg:#e6e6e8; --muted:#94a3b8; --accent:#4ade80; --border:#1f2937; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--fg); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { max-width:560px; width:100%; background:#111827; border:1px solid var(--border); border-radius:16px; padding:40px 32px; text-align:center; }
  .icon { width:72px; height:72px; border-radius:50%; background:#1f2937; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; color:var(--muted); }
  h1 { margin:0 0 12px; font-size:1.75rem; }
  p { color:var(--muted); margin:0 0 20px; line-height:1.6; }
  .btn { display:inline-block; background:var(--accent); color:#0a0a0f; padding:12px 24px; border-radius:8px; text-decoration:none; font-weight:600; margin-top:16px; border:none; cursor:pointer; font-size:1rem; }
  .btn:hover { opacity:0.9; }
  .btn-ghost { background:transparent; color:var(--fg); border:1px solid var(--border); margin-left:8px; }
  .small { font-size:0.85rem; margin-top:24px; color:var(--muted); }
</style>
</head>
<body>
<main class="card" role="main">
  <div class="icon" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
  </div>
  <h1>Checkout cancelled.</h1>
  <p>No charge was made. You can still use the free tier — live job search, sample dashboard, and one ATS rewrite to try it out — for as long as you like.</p>
  <p class="small">Have a question about pricing or what's included? Email Jerome and he'll get back to you.</p>
  <a class="btn" href="/">Back to the app</a>
  <a class="btn btn-ghost" href="mailto:jerome7207@gmail.com?subject=CandyBabble%20pricing%20question">Email Jerome</a>
</main>
</body>
</html>
